name: payment-ship
services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
    ports:
      - "17019:27017"
    volumes:
      - mongo_payment_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ping: 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  payment-service:
    container_name: payment-service
    build:
      context: ../../../
      dockerfile: PaymentService/src/PaymentService.Api/dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MONGODB_CONNECTION_STRING: ${MONGODB_CONNECTION_STRING}
      RABBITMQ_CONNECTION_STRING: ${RABBITMQ_CONNECTION_STRING}
      JwtSettings__Secret: ${JwtSettings__Secret}
      JwtSettings__Issuer: ${JwtSettings__Issuer}
      JwtSettings__Audience: ${JwtSettings__Audience}
      StripeConfiguration__ApiKey: ${StripeConfiguration__ApiKey}
      StripeConfiguration__RefreshUrl: ${StripeConfiguration__RefreshUrl}
      StripeConfiguration__ReturnUrl: ${StripeConfiguration__ReturnUrl}
    ports:
      - "9092:8080"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - payment-network
      - complyapi-network

volumes:
  mongo_payment_data:

networks:
  payment-network:
  complyapi-network:
    external: true