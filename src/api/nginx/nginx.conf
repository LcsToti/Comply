user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    # CORS Mapper
    map $http_origin $cors_origin {
        ~*^https://comply\.lcstoti\.dev$ "https://comply.lcstoti.dev";
        default "";
    }

    # Upstreams
    upstream listing_backend {
        zone listing_backend 64k;
        server listing-service:8080 resolve;
        keepalive 32;
    }

    upstream notification_backend {
        zone notification_backend 64k;
        server notification-service:8080 resolve;
        keepalive 32;
    }

    upstream payment_backend {
        zone payment_backend 64k;
        server payment-service:8080 resolve;
        keepalive 32;
    }

    upstream product_backend {
        zone product_backend 64k;
        server product-service:8080 resolve;
        keepalive 32;
    }

    upstream sale_backend {
        zone sale_backend 64k;
        server sale-service:8080 resolve;
        keepalive 32;
    }

    upstream user_backend {
        zone user_backend 64k;
        server user-service:8080 resolve;
        keepalive 32;
    }

    
    include       mime.types;
    default_type  application/json;
    sendfile      on;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Timeouts
    client_max_body_size 10m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_http_version 1.1;

    # Esta linha, junto com os blocos upstream/keepalive, garante o reuso de conexões.
    proxy_set_header Connection ""; 

    # Headers necessários
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8080;
        server_name _;
        
        ## Listing Service (Upstream: listing_backend)
        location ^~ /api/v1/listings { 
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }
            if ($cors_origin != "") {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
            }
            proxy_pass http://listing_backend; 
        }

        location ^~ /api/v1/auctions { 
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }
            if ($cors_origin != "") {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials "true" always;
            }
            proxy_pass http://listing_backend; 
        }

        ## Notification Service (Upstream: notification_backend)
        location ^~ /api/v1/notifications {
