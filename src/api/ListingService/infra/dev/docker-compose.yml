name: listing-ship
services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
    ports:
      - "17017:27017"
    volumes:
      - mongo_listing_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ping: 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - listing-network

  listing-service:
    container_name: listing-service
    build:
      context: ../../../
      dockerfile: ListingService/src/ListingService.Api/dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MONGODB_CONNECTION_STRING: ${MONGODB_CONNECTION_STRING}
      RABBITMQ_CONNECTION_STRING: ${RABBITMQ_CONNECTION_STRING}
      JwtSettings__Secret: ${JwtSettings__Secret}
      JwtSettings__Issuer: ${JwtSettings__Issuer}
      JwtSettings__Audience: ${JwtSettings__Audience}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
    ports:
      - "9090:8080"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - listing-network
      - complyapi-network

volumes:
  mongo_listing_data:

networks:
  listing-network:
  complyapi-network:
    external: true